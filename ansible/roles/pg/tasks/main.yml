---
- name: Install PostgreSQL {{ pg_version }} (native trixie package) + psycopg2 for the Ansible module
  ansible.builtin.apt:
    name: ["postgresql-{{ pg_version }}", "python3-psycopg2"]
    update_cache: true
    state: present

- name: Stop the default cluster before relocating its data directory
  ansible.builtin.command: pg_dropcluster --stop {{ pg_version }} main
  args:
    removes: /etc/postgresql/{{ pg_version }}/main
  register: dropped
  changed_when: dropped.rc == 0

- name: Own the data mount point
  ansible.builtin.file:
    path: /pg/data
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"

- name: Create the cluster on the ssd-data mount
  ansible.builtin.command: pg_createcluster {{ pg_version }} main --datadir={{ pg_data_dir }}
  args:
    creates: "{{ pg_data_dir }}/PG_VERSION"

- name: Listen on the private IP only
  ansible.builtin.lineinfile:
    path: /etc/postgresql/{{ pg_version }}/main/postgresql.conf
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '{{ pg_listen_addr }}'"
  notify: restart postgresql

- name: Modest tuning for a 2 GB CT
  ansible.builtin.lineinfile:
    path: /etc/postgresql/{{ pg_version }}/main/postgresql.conf
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: "shared_buffers", value: "512MB" }
    - { key: "effective_cache_size", value: "1536MB" }
    - { key: "max_connections", value: "50" }
  notify: restart postgresql

- name: Allow auth from the private subnet only
  ansible.builtin.lineinfile:
    path: /etc/postgresql/{{ pg_version }}/main/pg_hba.conf
    line: "host    all             all             10.10.10.0/24           scram-sha-256"
    insertafter: EOF
  notify: restart postgresql

- name: Flush handlers now so the Vault-management user step runs against the final config
  ansible.builtin.meta: flush_handlers

- name: Generate a password for the Vault-management superuser
  ansible.builtin.set_fact:
    vaultadmin_password: "{{ lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}"

- name: Create the vaultadmin role (Vault's database/ engine uses this to mint/drop per-consumer creds)
  become_user: postgres
  community.postgresql.postgresql_user:
    name: vaultadmin
    password: "{{ vaultadmin_password }}"
    role_attr_flags: CREATEROLE,CREATEDB,LOGIN
    encrypted: true

- name: Print the vaultadmin password once, for the operator to paste into Vault directly (runbook Step 7 — never captured to a file)
  ansible.builtin.debug:
    msg: "vaultadmin password (paste into Vault now, then forget): {{ vaultadmin_password }}"
