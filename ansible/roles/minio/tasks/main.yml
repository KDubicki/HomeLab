---
- name: Download MinIO {{ minio_version }}
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/archive/minio.{{ minio_version }}"
    dest: /usr/local/bin/minio
    checksum: "sha256:{{ minio_sha256 }}"
    mode: "0755"

- name: Create minio system group
  ansible.builtin.group:
    name: minio
    system: true

- name: Create minio system user
  ansible.builtin.user:
    name: minio
    group: minio
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Own the data mount point
  ansible.builtin.file:
    path: /minio/data
    state: directory
    owner: minio
    group: minio
    mode: "0750"

- name: Generate root credentials
  ansible.builtin.set_fact:
    minio_root_user: "minioadmin-{{ lookup('ansible.builtin.password', '/dev/null length=8 chars=ascii_lowercase,digits') }}"
    minio_root_password: "{{ lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  no_log: true

- name: Write the environment file (root:root-only; root creds are seeded here, then held in Vault — runbook Step 7)
  ansible.builtin.copy:
    dest: /etc/default/minio
    owner: root
    group: root
    mode: "0600"
    content: |
      MINIO_ROOT_USER={{ minio_root_user }}
      MINIO_ROOT_PASSWORD={{ minio_root_password }}
      MINIO_VOLUMES=/minio/data
      MINIO_OPTS="--address :9000 --console-address :9001"

- name: Install the minio systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/minio.service
    mode: "0644"
    content: |
      [Unit]
      Description=MinIO Object Storage
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=minio
      Group=minio
      EnvironmentFile=/etc/default/minio
      ExecStart=/usr/local/bin/minio server $MINIO_OPTS $MINIO_VOLUMES
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
  notify: restart minio

- name: Enable + start minio
  ansible.builtin.systemd:
    name: minio
    enabled: true
    state: started
    daemon_reload: true

- name: Root credentials are ready for the operator to read directly (never printed here — see /etc/default/minio)
  ansible.builtin.debug:
    msg: "MinIO root credentials are in /etc/default/minio (0600, root-only) on this host. Read them yourself via your own ssh session — e.g. `ssh proxmox` then `pct exec 121 -- cat /etc/default/minio` — and paste into Vault kv/minio in runbook Step 7. Never report the value back through the assistant."
